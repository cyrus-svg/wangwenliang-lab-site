# 网站配置
# 文档: https://docs.hugoblox.com/

# 外观设置 - 中式简约风格

appearance:
  theme_day: minimal
  theme_night:
  font: native
  font_size: L

# SEO设置

marketing:
  seo:
    site_type: Organization
    local_business_type: ''
    org_name: '王文靓实验室'
    description: '王文靓实验室官方网站'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    google_tag_manager: ''
    microsoft_clarity: ''
  verification:
    google: ''
    baidu: ''

# 网站头部

header:
  navbar:
    enable: true
    align: c
    show_logo: true
    show_language: false
    show_day_night: false
    show_search: false
    highlight_active_link: true

# 网站底部

footer:
  copyright:
    notice: '© {year} 王文靓实验室 版权所有'
    license:
      enable: false
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# 本地化设置（中文格式）

locale:
  date_format: '2006年1月2日'
  time_format: '15:04'
  address_format: zh-cn

# 网站功能

features:
  syntax_highlighter:
    enable: false
    extra_languages:
      - r
      - latex
  math:
    enable: false
  privacy_pack:
    enable: false
  repository:
    url: ''
    content_dir: content
    branch: main
  avatar:
    gravatar: false
    shape: circle
  comment:
    provider: ''
  search:
    provider: wowchemy
  map:
    provider: 'mapnik'
    api_key: ''
    zoom: 15

# 扩展

extensions:
  decap_cms:
    branch: main
    local_backend: false
  academicons:
    enable: true

# 引用格式

publications:
  date_format: 2006年1月
  citation_style: apa